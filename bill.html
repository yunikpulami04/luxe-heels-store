<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE BOUTIQUE | SECURE CHECKOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD&components=buttons"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --deep-onyx: #0B0C10;
            --gold-dust: #C6A43F;
            --mauve-suede: #A06E62;
            --cream: #FDF9F2;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(125deg, #F4EFE6 0%, #ECE4D8 100%);
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkout-container {
            max-width: 1080px;
            width: 100%;
            margin: 0 auto;
        }
        .luxe-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 36px;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            box-shadow: 0 30px 55px -20px rgba(0,0,0,0.35);
            border: 1px solid rgba(198,164,63,0.35);
        }
        .details-panel {
            flex: 1.3;
            padding: 2.2rem 2rem;
            background: white;
        }
        .summary-panel {
            flex: 1;
            background: #FCFAF7;
            padding: 2rem;
            border-left: 1px solid rgba(0,0,0,0.05);
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
            color: #1f1a15;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: #8f7a6b;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ece2d8;
            border-radius: 24px;
            margin-top: 5px;
            font-family: 'Inter', sans-serif;
            background: #fff;
            transition: 0.2s;
        }
        input:focus {
            border-color: var(--gold-dust);
            outline: none;
            box-shadow: 0 0 0 2px rgba(198,164,63,0.2);
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #e5d9ce;
            font-size: 0.9rem;
        }
        .total-amount {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--deep-onyx);
            margin: 15px 0 20px;
            padding-top: 12px;
            border-top: 2px solid var(--gold-dust);
            display: flex;
            justify-content: space-between;
        }
        .paypal-sect {
            margin-top: 10px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: #a18f7c;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .back-link:hover {
            color: var(--gold-dust);
        }
        @media (max-width: 780px) {
            .luxe-card {
                flex-direction: column;
            }
            .summary-panel {
                border-left: none;
                border-top: 1px solid #eee5db;
            }
        }
    </style>
</head>
<body>
<div class="checkout-container">
    <div class="luxe-card">
        <div class="details-panel">
            <h2><i class="fas fa-crown" style="color:#C6A43F; margin-right: 10px;"></i> Shipping Atelier</h2>
            <form id="checkoutForm">
                <div class="input-group">
                    <label>Full name</label>
                    <input type="text" id="fullName" placeholder="Victoria Beckham" required>
                </div>
                <div class="input-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="elevate@luxe.com" required>
                </div>
                <div class="input-group">
                    <label>Delivery suite</label>
                    <input type="text" id="address" placeholder="Boutique Row, Madison Ave" required>
                </div>
            </form>
        </div>
        <div class="summary-panel">
            <h2><i class="fas fa-heart" style="color:#C6A43F;"></i>  Your curation</h2>
            <div id="orderItemsList"></div>
            <div class="total-amount">
                <span>GRAND TOTAL</span>
                <span id="finalTotalSpan">$0</span>
            </div>
            <div id="paypal-button-container" class="paypal-sect"></div>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Refine your edit</a>
        </div>
    </div>
</div>

<script>
    // Retrieve cart and totals from localStorage (same keys used in heels main page)
    const cart = JSON.parse(localStorage.getItem('luxeHeelsCart')) || {};
    const totalRaw = localStorage.getItem('finalHeelsTotal') || 0;
    let finalTotal = parseFloat(totalRaw);
    if(isNaN(finalTotal)) finalTotal = 0;
    
    const orderContainer = document.getElementById('orderItemsList');
    if(orderContainer && Object.keys(cart).length > 0) {
        for(let key in cart) {
            const item = cart[key];
            const itemTotal = item.price * item.qty;
            const div = document.createElement('div');
            div.className = 'order-item';
            div.innerHTML = `<span><strong>${item.brand || 'LUXE'}</strong> ${item.name} <span style="font-size:0.75rem;">(x${item.qty})</span></span>
                            <span>$${itemTotal.toLocaleString()}</span>`;
            orderContainer.appendChild(div);
        }
    } else {
        orderContainer.innerHTML = '<div class="order-item" style="color:#b4827a">Your atelier is empty. <a href="index.html" style="color:#C6A43F;">Shop heels</a></div>';
    }
    
    document.getElementById('finalTotalSpan').innerText = `$${finalTotal.toLocaleString()}`;
    
    // if total = 0, maybe disable paypal? but we keep parity
    if(finalTotal > 0) {
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: finalTotal.toFixed(2) },
                        description: "LUXE Heels Boutique"
                    }]
                })
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert(`✨ Thank you ${details.payer.name.given_name}! Your luxury heels order is confirmed.`);
                    localStorage.removeItem('luxeHeelsCart');
                    localStorage.removeItem('finalHeelsTotal');
                    window.location.href = 'index.html';
                });
            },
            onError: function(err) {
                console.error(err);
                alert('Payment gateway elegant error — please try again.');
            }
        }).render('#paypal-button-container');
    } else {
        const container = document.getElementById('paypal-button-container');
        if(container) container.innerHTML = '<p style="color:#a06e62; font-size:0.8rem;"><i class="fas fa-shopping-cart"></i> Add stunning heels to proceed</p>';
    }
</script>
</body>
</html>
