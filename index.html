<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE Heels</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Inter,sans-serif;
    background:#f7f5f2;
    color:#111;
    padding-bottom:90px;
}

/* HEADER */
.hero{
    text-align:center;
    padding:2rem 1rem;
}
.hero h1{
    font-family:'Playfair Display',serif;
    font-size:2.2rem;
}
.hero p{
    font-size:.9rem;
    color:#777;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:0 16px;
}

/* GRID */
.heels-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

@media(max-width:900px){
    .heels-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
    .heels-grid{grid-template-columns:1fr;}
}

/* CARD */
.heel-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #eee;
    transition:.25s;
}
.heel-card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* IMAGE */
.heel-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* CONTENT */
.card-content{
    padding:1rem;
}

.brand-name{
    font-size:.65rem;
    letter-spacing:1px;
    color:#b89b3c;
}

.shoe-title{
    font-family:'Playfair Display',serif;
    font-size:1.1rem;
}

.price{
    font-weight:600;
    margin:6px 0;
}

/* BUTTONS */
.btn-group{
    display:flex;
    gap:8px;
}

button{
    flex:1;
    padding:8px;
    border:none;
    border-radius:20px;
    font-size:.75rem;
    cursor:pointer;
}

.add-btn{
    background:#111;
    color:#fff;
}
.add-btn:hover{
    background:#C6A43F;
    color:#000;
}

.remove-btn{
    background:#eee;
    color:#a33;
}

/* CART BAR */
.cart-bar{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:700px;
    background:#111;
    color:#fff;
    padding:.7rem 1rem;
    border-radius:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:.85rem;
}

.confirm-link{
    background:#C6A43F;
    color:#000;
    padding:6px 16px;
    border-radius:20px;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<header class="hero">
    <h1>MAISON LUXE</h1>
    <p>Elegant Heels Collection</p>
</header>

<div class="container">
    <div class="heels-grid" id="heelsGrid"></div>
</div>

<div class="cart-bar">
    <span id="cartText">Cart empty</span>
    <a href="bill.html" class="confirm-link">Checkout</a>
</div>

<script>
const heelsCollection=[
{id:1,brand:"LOUBOUTIN",name:"So Kate",price:895,img:"https://images.unsplash.com/photo-1591884807537-0bce39888fe0?q=80&w=541&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
{id:2,brand:"JIMMY CHOO",name:"Azia Crystal",price:1250,img:"https://images.unsplash.com/photo-1581101767113-1677fc2beaa8?q=80&w=580&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
{id:3,brand:"MANOLO",name:"Hangisi",price:1395,img:"https://images.unsplash.com/photo-1710916025782-18d93d00ec4d?q=80&w=871&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
{id:4,brand:"ROSSI",name:"Plexi",price:990,img:"https://plus.unsplash.com/premium_photo-1738862176120-7767fce1244f?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
{id:5,brand:"CAOVILLA",name:"Crystal Sandal",price:1750,img:"https://images.unsplash.com/photo-1535043934128-cf0b28d52f95?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"},
{id:6,brand:"MUADDI",name:"Maya Slide",price:1095,img:"https://images.unsplash.com/photo-1551489186-ccb95a1ea6a3?q=80&w=1471&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||{};

function render(){
let grid=document.getElementById("heelsGrid");
grid.innerHTML="";

heelsCollection.forEach(h=>{
let qty=cart[h.id]?.qty||0;

let div=document.createElement("div");
div.className="heel-card";
div.innerHTML=`
<img class="heel-image" src="${h.img}">
<div class="card-content">
<div class="brand-name">${h.brand}</div>
<div class="shoe-title">${h.name}</div>
<div class="price">$${h.price}</div>

<div class="btn-group">
<button class="add-btn" onclick="add(${h.id})">Add</button>
${qty?`<button class="remove-btn" onclick="removeItem(${h.id})">Remove</button>`:""}
</div>

${qty?`<small>${qty} in cart</small>`:""}
</div>
`;
grid.appendChild(div);
});

updateCart();
}

function add(id){
if(cart[id]) cart[id].qty++;
else{
let h=heelsCollection.find(x=>x.id===id);
cart[id]={...h,qty:1};
}
save();
}

function removeItem(id){
cart[id].qty--;
if(cart[id].qty<=0) delete cart[id];
save();
}

function updateCart(){
let total=0,items=0;
Object.values(cart).forEach(i=>{
items+=i.qty;
total+=i.qty*i.price;
});
document.getElementById("cartText").innerText=
items?`${items} items • $${total}`:"Cart empty";
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("total",JSON.stringify(cart));
render();
}

render();
</script>

</body>
</html>
